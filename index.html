<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Một bức thư bí ẩn...</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="background" id="bg-hearts">
        <!-- Floating hearts will be generated here -->
    </div>
    
    <div class="message-container" id="messageContainer">
        <div class="card">
            <h1 id="trollTitle">Bị troll rồi nà!! 🤪</h1>
            <p id="trollDesc">Thức khuya vậy má, ngủ đi mai còn đi làm nữa!! Lêu lêu 🤣</p>
            <p id="trollSub">Haha đùa chút thôi, ngủ ngoan nha!!! 💖✨</p>
            <div class="gif-container">
                <img id="trollImg" src="capitalism_boss.png" alt="Troll Image" class="troll-gif">
            </div>
            <div id="kpiContainer" class="kpi-container" style="display: none;">
                <!-- Table will be injected here -->
            </div>
            <div id="flowerBurst" class="flower-burst"></div>
            <div class="btn-group" id="btnGroup">
                <button id="mainBtn">Tớ là Quỷ Dạ Xoa</button>
                <button id="runBtn" class="run-btn">Tớ Xinh Đẹp</button>
            </div>
        </div>
    </div>

    <div class="envelope-wrapper" id="envelopeWrapper">
        <div class="envelope" id="envelope">
            <div class="envelope-back"></div>
            <div class="envelope-paper">
                <div class="paper-text">Thư gửi ấy...</div>
            </div>
            <div class="envelope-front"></div>
            <div class="envelope-flap"></div>
            <div class="heart-seal">✨</div>
            <div class="text">Mở thử đi...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
